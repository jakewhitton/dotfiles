# /etc/portage/make.conf

#CFLAGS
CFLAGS="-march=native -O2 -pipe"

#CXXFLAGS
CXXFLAGS="${CFLAGS}"

#CHOST
CHOST="x86_64-pc-linux-gnu"

#MAKEOPTS
MAKEOPTS="-j3"

#USE flags
USE="acpi bash-completion -bluetooth branding cups dri -emacs ffmpeg gif git gnome gtk icu jpeg -kde lame latex lm_sensors mp3 mp4 mpeg ncurses networkmanager offensive opengl pdf -plasma pulseaudio -qt4 -qt5 -smartcard savedconfig sound startup-notification systemd threads unicode vim-syntax wifi X xft"

#CPU flags
CPU_FLAGS_X86="aes avx avx2 fma3 mmx mmxext popcnt sse sse2 sse3 sse4_1 sse4_2 ssse3"

#VIDEO_CARDS
VIDEO_CARD="intel i965"

#INPUT_DEVICES
INPUT_DEVICES="evdev"

PORTDIR="/usr/portage"
DISTDIR="${PORTDIR}/distfiles"
PKGDIR="${PORTDIR}/packages"
