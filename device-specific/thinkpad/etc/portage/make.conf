# /etc/portage/make.conf

# CFLAGS
CFLAGS="-march=native -O2 -pipe"

# CXXFLAGS
CXXFLAGS="${CFLAGS}"

# MAKEOPTS
MAKEOPTS="-j4"

# CHOST
CHOST="x86_64-pc-linux-gnu"

# CPU_FLAGS_X86
CPU_FLAGS_X86="aes avx avx2 fma3 mmx mmxext pclmul popcnt sse sse2 sse3 sse4_1 sse4_2 ssse3"

# USE flags
USE="acpi bash-completion bindist -bluetooth branding cups dri -emacs fontconfig gif -gimp git gnome gtk imap ipv6 jpeg -kde lame latex lm_sensors mp3 mp4 networkmanager offensive opengl pdf -plasma png pulseaudio -qt4 -qt5 savedconfig sound spell threads truetype unicode vim-syntax wifi X xft"

# VIDEO_CARDS
VIDEO_CARDS="intel i965"

# INPUT_DEVICES
INPUT_DEVICES="libinput keyboard"

PORTDIR="/usr/portage"
DISTDIR="${PORTDIR}/distfiles"
PKGDIR="${PORTDIR}/packages"
