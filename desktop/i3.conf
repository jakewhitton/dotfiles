#Set modifier key to L-Alt
set $mod Mod1

#Set border settings
new_window 1pixel

#Set wallpaper
exec_always feh --bg-scale /home/jake/wallpaper.*

#Set font
font pango:inconsolata-g 12

#Set colors
client.focused          #0000ff #0000ff #0000ff #0000ff
client.focused_inactive #000000 #000000 #ffffff #484e50
client.unfocused        #000000 #000000 #000000 #000000
client.urgent           #ff0000 #ff0000 #ff0000 #ff0000
client.placeholder      #000000 #0c0c0c #ffffff #000000
client.background       #000000

#User Keybindings
bindsym $mod+t exec urxvt
bindsym $mod+g exec google-chrome-stable
bindsym $mod+i exec google-chrome-stable --incognito
bindsym $mod+d exec j4-dmenu-desktop
bindsym XF86AudioRaiseVolume exec /home/jake/Programming/Bash/volumeup
bindsym XF86AudioLowerVolume exec /home/jake/Programming/Bash/volumedown
bindsym XF86AudioMute exec /home/jake/Programming/Bash/mute

#Define workspace names
set $ws1 "1:1. Web"
set $ws2 "2:2. Terminal"
set $ws3 "3:3. Programming"
set $ws4 "4:4. Gaming"
set $ws5 "5:5. Communication"
set $ws6 "6:6. Homework"
set $ws7 "7:7. Ckb"
set $ws8 "8:8. Misc"
set $ws9 "9:9. Misc"
set $ws10 "10:10. Misc"
set $ws11 "11:1. Web"
set $ws12 "12:2. Terminal"
set $ws13 "13:3. Programming"
set $ws14 "14:4. Gaming"
set $ws15 "15:5. Communication"
set $ws16 "16:6. Homework"
set $ws17 "17:7. Ckb"
set $ws18 "18:8. Misc"
set $ws19 "19:9. Misc"
set $ws20 "20:10. Misc"

bindsym $mod+1 workspace $ws1
bindsym $mod+2 workspace $ws2
bindsym $mod+3 workspace $ws3
bindsym $mod+4 workspace $ws4
bindsym $mod+5 workspace $ws5
bindsym $mod+6 workspace $ws6
bindsym $mod+7 workspace $ws7
bindsym $mod+8 workspace $ws8
bindsym $mod+9 workspace $ws9
bindsym $mod+0 workspace $ws10
bindsym $mod+KP_End workspace $ws11
bindsym $mod+KP_Down workspace $ws12
bindsym $mod+KP_Next workspace $ws13
bindsym $mod+KP_Left workspace $ws14
bindsym $mod+KP_Begin workspace $ws15
bindsym $mod+KP_Right workspace $ws16
bindsym $mod+KP_Home workspace $ws17
bindsym $mod+KP_Up workspace $ws18
bindsym $mod+KP_Prior workspace $ws19
bindsym $mod+KP_Insert workspace $ws20

bindsym $mod+Shift+1 move container to workspace $ws1
bindsym $mod+Shift+2 move container to workspace $ws2
bindsym $mod+Shift+3 move container to workspace $ws3
bindsym $mod+Shift+4 move container to workspace $ws4
bindsym $mod+Shift+5 move container to workspace $ws5
bindsym $mod+Shift+6 move container to workspace $ws6
bindsym $mod+Shift+7 move container to workspace $ws7
bindsym $mod+Shift+8 move container to workspace $ws8
bindsym $mod+Shift+9 move container to workspace $ws9
bindsym $mod+Shift+0 move container to workspace $ws10
bindsym $mod+Shift+KP_End move container to workspace $ws11
bindsym $mod+Shift+KP_Down move container to workspace $ws12
bindsym $mod+Shift+KP_Next move container to workspace $ws13
bindsym $mod+Shift+KP_Left move container to workspace $ws14
bindsym $mod+Shift+KP_Begin move container to workspace $ws15
bindsym $mod+Shift+KP_Right move container to workspace $ws16
bindsym $mod+Shift+KP_Home move container to workspace $ws17
bindsym $mod+Shift+KP_Up move container to workspace $ws18
bindsym $mod+Shift+KP_Prior move container to workspace $ws19
bindsym $mod+Shift+KP_Insert move container to workspace $ws20

workspace $ws1 output DP-4
workspace $ws2 output DP-4
workspace $ws3 output DP-4
workspace $ws4 output DP-4
workspace $ws5 output DP-4
workspace $ws6 output DP-4
workspace $ws7 output DP-4
workspace $ws8 output DP-4
workspace $ws9 output DP-4
workspace $ws10 output DP-4
workspace $ws11 output HDMI-0
workspace $ws12 output HDMI-0
workspace $ws13 output HDMI-0
workspace $ws14 output HDMI-0
workspace $ws15 output HDMI-0
workspace $ws16 output HDMI-0
workspace $ws17 output HDMI-0
workspace $ws18 output HDMI-0
workspace $ws19 output HDMI-0
workspace $ws20 output HDMI-0

bindsym $mod+Shift+q kill

floating_modifier $mod

bindsym $mod+j focus left
bindsym $mod+k focus down
bindsym $mod+l focus up
bindsym $mod+semicolon focus right

bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

bindsym $mod+Shift+j move left
bindsym $mod+Shift+k move down
bindsym $mod+Shift+l move up
bindsym $mod+Shift+semicolon move right

bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

bindsym $mod+h split h
bindsym $mod+v split v

bindsym $mod+f fullscreen toggle
bindsym $mod+Shift+space floating toggle
bindsym $mod+space focus mode_toggle
bindsym $mod+a focus parent

bindsym $mod+Shift+c reload
bindsym $mod+Shift+r restart
bindsym $mod+Shift+e exec "i3-nagbar -t warning -m 'Exit i3?' -b 'Yes' 'i3-msg exit'"

mode "resize" {
        bindsym j resize shrink width 1 px or 1 ppt
        bindsym k resize grow height 1 px or 1 ppt
        bindsym l resize shrink height 1 px or 1 ppt
        bindsym semicolon resize grow width 1 px or 1 ppt

        bindsym Left resize shrink width 1 px or 1 ppt
        bindsym Down resize grow height 1 px or 1 ppt
        bindsym Up resize shrink height 1 px or 1 ppt
        bindsym Right resize grow width 1 px or 1 ppt

        bindsym Return mode "default"
        bindsym Escape mode "default"
}

bindsym $mod+r mode "resize"

bar {
	strip_workspace_numbers	yes
	colors{
		background #000000
        	statusline #ffffff
        	separator #666666

        	focused_workspace  #000000 #0000ff #ffffff
        	active_workspace   #000000 #0000ff #ffffff
        	inactive_workspace #000000 #000000 #ffffff
        	urgent_workspace   #000000 #ff0000 #ffffff
        	binding_mode       #2f343a #900000 #ffffff
	}
        status_command i3blocks -c /home/jake/.config/i3blocks/config
        tray_output primary
	position top
}
